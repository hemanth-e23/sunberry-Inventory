version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: sunberry-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sunberry_inventory}
      POSTGRES_USER: ${POSTGRES_USER:-sunberry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sunberry} -d ${POSTGRES_DB:-sunberry_inventory}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sunberry-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sunberry-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sunberry}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-sunberry_inventory}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      DEBUG: ${DEBUG:-False}
      HOST: 0.0.0.0
      PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-True}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      RATE_LIMIT_LOGIN_PER_MINUTE: ${RATE_LIMIT_LOGIN_PER_MINUTE:-5}
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ./backend:/app
    networks:
      - sunberry-network
    restart: unless-stopped

  # Cloudflare Tunnel - exposes backend to the internet
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: sunberry-tunnel
    command: tunnel --protocol http2 --url http://backend:8000
    depends_on:
      - backend
    networks:
      - sunberry-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  sunberry-network:
    driver: bridge
