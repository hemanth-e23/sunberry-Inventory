<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Sunberry Inventory</title>
    <script>
      var l = window.location;
      var base = '/sunberry-Inventory';
      var path = l.pathname.slice(base.length) || '/';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        base + '/?p=' + encodeURIComponent(path) +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
